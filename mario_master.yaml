    proyectos:
      - name: SageMaker Churn Prediction
        summary: "Implementación de un pipeline de Machine Learning (MLOps) para la predicción de fuga de clientes. Tecnologías: Python, Amazon SageMaker, XGBoost, Boto3, AWS S3."
        highlights:
          - Diseño y despliegue de pipelines de ML end-to-end en AWS SageMaker.
          - Implementación del algoritmo XGBoost para clasificación binaria de alta precisión.
          - Gestión de almacenamiento de datos y artefactos de modelos en AWS S3.
      - name: Pronósticos PEA y Turismo Polos de Desarrollo
        summary: "Análisis estadístico y predictivo sobre la Población Económicamente Activa y el sector turístico en México. Tecnologías: Python, SARIMA (Statsmodels), Pandas, Matplotlib, Seaborn."
        highlights:
          - Modelado predictivo de series de tiempo utilizando técnicas avanzadas de econometría (SARIMA).
          - Análisis de grandes volúmenes de datos económicos para identificar estacionalidades y tendencias de largo plazo.
          - Generación de insights estratégicos para el apoyo en la toma de decisiones gubernamentales y empresariales.
      - name: Webscrapping Tools
        summary: "Herramientas de automatización para la extracción masiva de datos de plataformas inmobiliarias dinámicas como Lamudi y AirBNB. Tecnologías: Python, Selenium, Beautiful Soup (BS4), Pandas."
        highlights:
          - Desarrollo de scrapers para sitios con contenido cargado dinámicamente mediante JavaScript.
          - Automatización de procesos de recolección de datos y limpieza de información no estructurada.
          - Gestión de técnicas avanzadas para evitar el bloqueo de bots (user-agents, waits dinámicos).
      - name: QGIS Python Scripts (PyQGIS)
        summary: "Automatización de procesos dentro de Sistemas de Información Geográfica (SIG) para optimizar flujos de trabajo cartográficos. Tecnologías: Python (PyQGIS), GDAL/OGR, GeoPandas."
        highlights:
          - Automatización de análisis geoespacial masivo procesando formatos vectoriales como Shapefiles y GeoJSON.
          - Manipulación y reparación de geometrías y atributos en grandes conjuntos de datos espaciales.
          - Integración de scripts personalizados para modernización y actualización catastral.
      - name: Utilidades de Productividad IA
        summary: "Repositorio de scripts para automatización administrativa y personal mediante modelos de IA. Tecnologías: Python, OpenAI Whisper, PyPDF2, OS Module."
        highlights:
          - Implementación de modelos de procesamiento de lenguaje natural (NLP) como OpenAI Whisper para transcripción de audio.
          - Creación de herramientas para la manipulación masiva de archivos PDF y automatización de oficina.
      - name: Lab-AWS-Servicios-IA
        summary: "Laboratorio de experimentación con servicios cognitivos pre-entrenados de AWS para reconocimiento de imágenes y síntesis de voz. Tecnologías: AWS SDK (Boto3), Python, AWS Rekognition, AWS Transcribe, AWS Polly."
        highlights:
          - Integración de APIs de servicios cognitivos de AWS en aplicaciones de software mediante Boto3.
          - Desarrollo de soluciones de visión computacional y procesamiento de voz en la nube.
